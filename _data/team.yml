  description: Achilleas Chytas is an Engineer / Research Associate at the Institute of Applied Biosciences of Centre for Research and Technology Hellas (INAB|CERTH) in Thessaloniki, Greece. He has received a Diploma of Electrical and Computer Engineering as well as a MSc degree in Medical Informatics, both from the Aristotle University of Thessaloniki (AUTh). Since 2014 as a member of LoMI (Laboratory of Medical Informatics, AUTh), he has been part of many European and national R&D projects on Medical Informatics, related with telemonitoring, biomedical big data analytics, drug safety and pharmacovigilance focusing on signal processing and Knowledge Engineering. He has been collaborating with INAB|CERTH as late as 2015 while since 2020 he has been a member of the eHealth Lab.
  
