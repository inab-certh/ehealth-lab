  description: Panos Bonotis is an informatics and telecommunications engineer, currently working as a Research Associate at the eHealth Lab of the Institute of Applied Biosciences at the Centre for Research and Development Hellas, where he is involved in multiple EU and nationally funded projects. He is also in the 2nd year of his Ph.D., focusing on user experience in eHealth services. In that role, he is responsible for the usability studies of the projects (MyPal, PVClinical, Take-A-Breath) undertaken by the eHealth lab, among other things.

